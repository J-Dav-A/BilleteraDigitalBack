spring.application.name=BilleteraDigitalBack

# Base de datos
spring.datasource.url=jdbc:postgresql://localhost:5432/fintech
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA ? ddl-auto=update crea/actualiza tablas autom·ticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Logs silenciados
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.stat=OFF

# JWT
jwt.secret=fintech_super_secret_key_2026_proyecto_estructuras_datos
jwt.expiration=86400000

# Puerto
server.port=8080